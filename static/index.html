<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Skill Hub Manager</title>
  <link rel="icon" href="data:;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQEAAAAPw=">
  <link rel="stylesheet" href="index.css">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app-container">
    <!-- Left Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-icon">&#9889;</div>
        <div class="brand-title">
          <h1>AI Skill Hub</h1>
          <p>本地技能可视化管理器</p>
        </div>
      </div>

      <!-- Global Skill Library Config -->
      <div class="skills-dir-config">
        <div class="config-header">
          <span class="config-label">全局技能库</span>
          <button class="btn-config" onclick="handleChangeSkillsDir()" title="更改全局技能库路径">
            <i data-lucide="settings" style="width:13px;height:13px;"></i>
          </button>
        </div>
        <div class="config-value" id="skills-dir-path" onclick="handleChangeSkillsDir()" title="点击选择新文件夹">加载中…</div>
      </div>

      <!-- Action Buttons -->
      <div class="sidebar-actions">
        <button class="btn btn-primary" onclick="handlePickProject()" id="btn-add-project">
          <i data-lucide="folder-plus" style="width:15px;height:15px;"></i>
          关联项目
        </button>
        <button class="btn btn-success" onclick="handleCreateSkill()" id="btn-new-skill">
          <i data-lucide="file-plus" style="width:15px;height:15px;"></i>
          新建技能
        </button>
      </div>

      <!-- Projects List -->
      <section class="sidebar-section" style="display:flex;flex-direction:column;flex:1;min-height:0;">
        <div class="section-title">
          <h2>目标项目</h2>
        </div>
        <div id="project-list" class="project-list">
          <div class="empty-state" style="padding:2rem 1rem;">
            <div class="empty-state-icon">📂</div>
            <h4>暂无关联项目</h4>
            <p>点击上方按钮选取文件夹</p>
          </div>
        </div>
      </section>
      
      <!-- Sidebar Footer (Settings) -->
      <div class="sidebar-footer">
        <button class="btn btn-secondary btn-settings" onclick="openSettingsModal()" id="btn-settings" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.5rem; padding: 0.65rem;">
          <i data-lucide="settings" style="width:15px;height:15px;"></i>
          <span id="sidebar-settings-text">系统设置</span>
        </button>
      </div>
    </aside>

    <!-- Right Main Panel -->
    <main class="main-panel">
      <header class="main-header">
        <div class="header-title">
          <h2 id="current-project-title">请选择一个项目进行配置</h2>
          <p id="current-project-desc">选择左侧项目后，可在此管理技能装载</p>
        </div>
        <div class="header-actions">
          <button id="sync-btn" class="btn btn-primary pulsing-btn" onclick="handleSyncSkills()" disabled>
            <i data-lucide="refresh-cw" style="width:16px;height:16px;"></i>
            一键同步技能
          </button>
        </div>
      </header>

      <!-- Stats -->
      <div class="stats-banner">
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">全局技能库</span>
            <span class="stat-value" id="stat-total-skills">0</span>
          </div>
          <div class="stat-icon primary"><i data-lucide="book-open"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">当前已装载</span>
            <span class="stat-value" id="stat-synced-skills">&mdash;</span>
          </div>
          <div class="stat-icon success"><i data-lucide="check-circle-2"></i></div>
        </div>
        <div class="stat-card">
          <div class="stat-info">
            <span class="stat-label">待更新</span>
            <span class="stat-value" id="stat-unsynced-skills">&mdash;</span>
          </div>
          <div class="stat-icon warning"><i data-lucide="alert-circle"></i></div>
        </div>
      </div>

      <!-- Search + Cards -->
      <div class="main-content">
        <div class="content-toolbar">
          <h3>全局技能列表</h3>
          <div class="toolbar-controls">
            <button class="btn btn-secondary btn-icon" id="btn-refresh-skills" onclick="handleRefreshSkills()" title="刷新全局技能库" style="margin-right: 8px; display: inline-flex; align-items: center; justify-content: center; width: 34px; height: 34px; padding: 0;">
              <i data-lucide="refresh-cw" style="width:14px;height:14px;"></i>
            </button>
            <div class="search-box">
              <i data-lucide="search" style="width:15px;height:15px;color:var(--text-muted);"></i>
              <input type="text" id="search-input" class="search-input" placeholder="搜索技能名称、标签…" oninput="handleSearch()">
            </div>
          </div>
        </div>
        <div id="cards-grid" class="cards-grid"></div>
      </div>
    </main>
  </div>

  <!-- Editor Modal -->
  <div id="editor-modal" class="modal-overlay">
    <div class="modal-container">
      <header class="modal-header">
        <div class="modal-title-info">
          <span class="modal-emoji" id="modal-emoji">📄</span>
          <h3 class="modal-title" id="modal-title">编辑技能</h3>
        </div>
        <div class="modal-header-actions">
          <div class="modal-tabs">
            <button class="modal-tab active" onclick="switchModalTab('edit')">编辑源码</button>
            <button class="modal-tab" onclick="switchModalTab('preview')">实时预览</button>
          </div>
          <button class="btn btn-secondary btn-icon" onclick="closeEditorModal()">
            <i data-lucide="x" style="width:18px;height:18px;"></i>
          </button>
        </div>
      </header>
      <div id="modal-body" class="modal-body tab-edit">
        <div class="editor-wrapper">
          <textarea id="markdown-textarea" class="markdown-textarea" placeholder="# 输入技能内容…"></textarea>
        </div>
        <div class="preview-wrapper">
          <div id="markdown-preview" class="markdown-preview"></div>
        </div>
      </div>
      <footer class="modal-header" style="border-top:1px solid var(--border-color);border-bottom:none;justify-content:flex-end;gap:0.75rem;">
        <button class="btn btn-secondary" onclick="closeEditorModal()">取消</button>
        <button class="btn btn-primary" onclick="handleSaveSkill()">
          <i data-lucide="save" style="width:16px;height:16px;"></i>
          保存并更新
        </button>
      </footer>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay">
    <div class="modal-container modal-settings-container" style="max-width: 600px;">
      <header class="modal-header">
        <div class="modal-title-info">
          <span class="modal-emoji">⚙️</span>
          <h3 class="modal-title" id="settings-modal-title">系统设置</h3>
        </div>
        <button class="btn btn-secondary btn-icon" onclick="closeSettingsModal()">
          <i data-lucide="x" style="width:18px;height:18px;"></i>
        </button>
      </header>
      <div class="modal-body settings-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem;">
        
        <!-- Section 1: General Preferences -->
        <div class="settings-group" style="display: flex; flex-direction: column; gap: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1.25rem;">
          <h4 id="settings-heading-general" style="font-size: 0.95rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem;">通用偏好 / General</h4>
          
          <div class="settings-row" style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
            <div class="settings-label-col" style="flex: 1;">
              <label for="settings-language" id="settings-label-lang" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); display: block;">系统语言 (Language)</label>
              <p class="settings-desc" id="settings-desc-lang" style="font-size: 0.75rem; color: var(--text-muted); margin: 0.15rem 0 0 0;">切换整个界面的显示语言</p>
            </div>
            <div class="settings-input-col" style="width: 180px;">
              <select id="settings-language" class="settings-select">
                <option value="zh">简体中文 (Chinese)</option>
                <option value="en">English (英文)</option>
              </select>
            </div>
          </div>
          
          <div class="settings-row" style="display: flex; justify-content: space-between; align-items: center; gap: 1rem;">
            <div class="settings-label-col" style="flex: 1;">
              <label for="settings-theme" id="settings-label-theme" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); display: block;">界面主题 (Theme)</label>
              <p class="settings-desc" id="settings-desc-theme" style="font-size: 0.75rem; color: var(--text-muted); margin: 0.15rem 0 0 0;">选择明亮模式或护眼深色模式</p>
            </div>
            <div class="settings-input-col" style="width: 180px;">
              <select id="settings-theme" class="settings-select">
                <option value="light" id="settings-theme-option-light">☀️ 明亮模式 (Light)</option>
                <option value="dark" id="settings-theme-option-dark">🌙 深色模式 (Dark)</option>
              </select>
            </div>
          </div>
        </div>

        <!-- Section 2: Path Settings -->
        <div class="settings-group" style="display: flex; flex-direction: column; gap: 1rem;">
          <h4 id="settings-heading-paths" style="font-size: 0.95rem; font-weight: 600; color: var(--text-main); margin-bottom: 0.25rem;">路径管理 / Paths</h4>
          
          <div class="settings-row" style="display: flex; flex-direction: column; gap: 0.4rem;">
            <div class="settings-label-col">
              <label id="settings-label-skillsdir" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); display: block;">全局技能库路径</label>
              <p class="settings-desc" id="settings-desc-skillsdir" style="font-size: 0.75rem; color: var(--text-muted); margin: 0;">存放全局技能规约 Markdown 文件的目录</p>
            </div>
            <div class="settings-input-col path-picker-group" style="display: flex; gap: 0.5rem; align-items: center; width: 100%;">
              <input type="text" id="settings-skills-dir" class="settings-input" readonly>
              <button class="btn btn-secondary btn-icon" onclick="handleSettingsPickSkillsDir()" title="选择文件夹" style="padding: 0.45rem; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px;">
                <i data-lucide="folder" style="width:14px;height:14px;"></i>
              </button>
            </div>
          </div>

          <div class="settings-row" style="display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.25rem;">
            <div class="settings-label-col">
              <label id="settings-label-scandir" style="font-size: 0.875rem; font-weight: 500; color: var(--text-main); display: block;">项目默认扫描起点</label>
              <p class="settings-desc" id="settings-desc-scandir" style="font-size: 0.75rem; color: var(--text-muted); margin: 0;">点击“关联项目”时，默认打开的初始目录</p>
            </div>
            <div class="settings-input-col path-picker-group" style="display: flex; gap: 0.5rem; align-items: center; width: 100%;">
              <input type="text" id="settings-scan-dir" class="settings-input" readonly>
              <button class="btn btn-secondary btn-icon" onclick="handleSettingsPickScanDir()" title="选择文件夹" style="padding: 0.45rem; display: flex; align-items: center; justify-content: center; height: 32px; width: 32px;">
                <i data-lucide="folder" style="width:14px;height:14px;"></i>
              </button>
            </div>
          </div>
        </div>

      </div>
      <footer class="modal-header" style="border-top:1px solid var(--border-color);border-bottom:none;justify-content:flex-end;gap:0.75rem;">
        <button class="btn btn-secondary" onclick="closeSettingsModal()" id="settings-btn-cancel">取消</button>
        <button class="btn btn-primary" onclick="handleSaveSettings()" id="settings-btn-save">
          <i data-lucide="save" style="width:16px;height:16px;"></i>
          保存配置
        </button>
      </footer>
    </div>
  </div>

  <!-- Custom Dialog Modal (Prompt/Confirm) -->
  <div id="dialog-modal" class="modal-overlay">
    <div class="modal-container" style="max-width: 480px; height: auto; display: flex; flex-direction: column;">
      <header class="modal-header" style="padding: 1.25rem 1.5rem;">
        <div class="modal-title-info">
          <span class="modal-emoji" id="dialog-emoji">💬</span>
          <h3 class="modal-title" id="dialog-title">提示</h3>
        </div>
        <button class="btn btn-secondary btn-icon" onclick="closeDialogModal()" style="padding: 0.25rem; border-radius: 6px; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center;">
          <i data-lucide="x" style="width:14px;height:14px;"></i>
        </button>
      </header>
      <div class="modal-body dialog-body" style="padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; overflow: visible;">
        <p id="dialog-message" style="font-size: 0.9rem; color: var(--text-main); line-height: 1.5; margin: 0;"></p>
        <div id="dialog-input-container" style="display: none; width: 100%;">
          <input type="text" id="dialog-input" class="settings-input" style="width: 100%;" placeholder="">
        </div>
      </div>
      <footer class="modal-header" style="border-top: 1px solid var(--border-color); border-bottom: none; justify-content: flex-end; gap: 0.75rem; padding: 1rem 1.5rem;">
        <button class="btn btn-secondary" onclick="closeDialogModal()" id="dialog-btn-cancel" style="padding: 0.5rem 1rem; font-size: 0.825rem; border-radius: 8px;">取消</button>
        <button class="btn btn-primary" id="dialog-btn-confirm" style="padding: 0.5rem 1rem; font-size: 0.825rem; border-radius: 8px;">确定</button>
      </footer>
    </div>
  </div>

  <div id="toast-container" class="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
